<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Color Choice Study</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app">
      <h1>Color Choice Study</h1>

      <section id="start-screen" class="panel visible">
        <h2>Start Session</h2>
        <label>
          User ID
          <input id="user-id-input" type="text" placeholder="e.g. P001" />
        </label>
        <button id="start-button">Start</button>
        <p class="hint">Each trial plays one video. After it ends, choose <strong>Cyan</strong> or <strong>Red</strong>.</p>
      </section>

      <section id="study-screen" class="panel hidden">
        <div id="status-line"></div>

        <div class="single-video-wrap">
          <video id="trial-video" playsinline muted>
            <source id="trial-source" src="" type="video/mp4" />
            Your browser does not support the video tag.
          </video>
        </div>

        <div id="choice-buttons" class="choice-buttons hidden">
          <button id="cyan-button" type="button" class="btn-cyan">Choose Cyan (C)</button>
          <button id="red-button" type="button" class="btn-red">Choose Red (R)</button>
          <button id="submit-choice-button" type="button" class="btn-submit" disabled>Submit Choice (Enter)</button>
        </div>
        <p id="choice-preview" class="choice-preview hidden">My choice: none</p>

        <div id="overlay" class="overlay hidden">
          <p id="overlay-text"></p>
          <button id="overlay-action" class="hidden" type="button">Play video</button>
        </div>
      </section>

      <section id="complete-screen" class="panel hidden">
        <h2>Complete</h2>
        <p id="complete-summary"></p>
      </section>

      <section id="message-bar" class="message hidden"></section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>

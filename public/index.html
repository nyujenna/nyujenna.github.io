<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2AFC Video Study</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app">
      <h1>2AFC Video Study</h1>

      <section id="start-screen" class="panel visible">
        <h2>Start Session</h2>
        <label>
          User ID
          <input id="user-id-input" type="text" placeholder="e.g. P001" />
        </label>
        <button id="start-button">Start</button>
        <p class="hint">Each trial plays 3 videos at once: GT on top, then two model outputs below. Choose with key 1 (left) or 2 (right).</p>
      </section>

      <section id="study-screen" class="panel hidden">
        <div id="status-line"></div>

        <div class="gt-wrap">
          <div class="video-label">GT (Reference)</div>
          <video id="gt-video" playsinline muted>
            <source id="gt-source" src="" type="video/mp4" />
            Your browser does not support the video tag.
          </video>
        </div>

        <div class="comparison-grid">
          <div class="video-cell">
            <div id="left-label" class="video-label">Video 1 (Left)</div>
            <video id="left-video" playsinline muted>
              <source id="left-source" src="" type="video/mp4" />
              Your browser does not support the video tag.
            </video>
          </div>
          <div class="video-cell">
            <div id="right-label" class="video-label">Video 2 (Right)</div>
            <video id="right-video" playsinline muted>
              <source id="right-source" src="" type="video/mp4" />
              Your browser does not support the video tag.
            </video>
          </div>
        </div>

        <div id="overlay" class="overlay hidden">
          <p id="overlay-text"></p>
          <button id="overlay-action" class="hidden" type="button">Play videos</button>
        </div>
      </section>

      <section id="complete-screen" class="panel hidden">
        <h2>Complete</h2>
        <p id="complete-summary"></p>
      </section>

      <section id="message-bar" class="message hidden"></section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
